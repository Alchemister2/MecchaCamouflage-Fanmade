name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-2022
    env:
      BUILD_VERSION: v1.6.2-unofficial.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build runtime
        shell: powershell
        run: .\scripts\build.ps1 -Version $env:BUILD_VERSION

      - name: Build artifact checks
        shell: powershell
        run: |
          if (-not (Test-Path ".build/bin/meccha-camouflage.exe")) { throw "runtime exe missing" }
          if (-not (Test-Path ".build/obj/package-native/runtime-bridge.dll")) { throw "runtime bridge dll missing" }
          if (-not (Test-Path ".build/obj/package-native/runtime-injector.exe")) { throw "runtime injector exe missing" }
          if (Test-Path ".build/obj/package-native/bridge-loader.dll") { throw "bridge loader must not be packaged" }
          if (Test-Path "src/native/loader/loader.cpp") { throw "obsolete loader source must not return" }
          if (Test-Path "src/native/include/bridge_loader_abi.hpp") { throw "obsolete loader ABI must not return" }

      - name: Package unofficial build
        shell: powershell
        run: |
          .\scripts\release.ps1 -Version $env:BUILD_VERSION
          $exePath = ".build/package/meccha-camouflage-$env:BUILD_VERSION.exe"
          if (-not (Test-Path $exePath)) { throw "package exe missing" }
          if ((Get-Item $exePath).Length -le 10000000) { throw "package exe is unexpectedly small" }

      - name: Upload unofficial build
        uses: actions/upload-artifact@v4
        with:
          name: meccha-camouflage-v1.6.2-unofficial.1
          path: .build/package/meccha-camouflage-v1.6.2-unofficial.1.exe
          if-no-files-found: error
          retention-days: 7
