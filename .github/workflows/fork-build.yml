name: Fork Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    env:
      BASE_VERSION: v1.6.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Create build version
        shell: powershell
        run: |
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $version = "$env:BASE_VERSION-fork.$env:GITHUB_RUN_NUMBER-$shortSha"
          "BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build runtime
        shell: powershell
        run: .\scripts\build.ps1 -Version $env:BUILD_VERSION

      - name: Check build outputs
        shell: powershell
        run: |
          if (-not (Test-Path ".build/bin/meccha-camouflage.exe")) { throw "runtime exe missing" }
          if (-not (Test-Path ".build/obj/package-native/runtime-bridge.dll")) { throw "runtime bridge dll missing" }
          if (-not (Test-Path ".build/obj/package-native/runtime-injector.exe")) { throw "runtime injector exe missing" }

      - name: Package fork build
        shell: powershell
        run: |
          .\scripts\release.ps1 -Version $env:BUILD_VERSION
          $exePath = ".build/package/meccha-camouflage-$env:BUILD_VERSION.exe"
          if (-not (Test-Path $exePath)) { throw "package exe missing" }
          if ((Get-Item $exePath).Length -le 10000000) { throw "package exe is unexpectedly small" }

      - name: Upload fork build
        uses: actions/upload-artifact@v4
        with:
          name: meccha-camouflage-${{ env.BUILD_VERSION }}
          path: .build/package/meccha-camouflage-${{ env.BUILD_VERSION }}.exe
          if-no-files-found: error
          retention-days: 14
